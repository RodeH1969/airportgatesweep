<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AGS Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
    h1 { font-size: 1.4rem; font-weight: 900; color: #f59e0b; margin-bottom: 4px; }
    .sub { font-size: 0.8rem; color: #64748b; margin-bottom: 20px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { text-align: left; padding: 6px 10px; color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #334155; }
    td { padding: 8px 10px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
    tr:hover td { background: #273548; }
    .seat { font-weight: 900; color: #e2e8f0; }
    .time { color: #60a5fa; font-weight: 700; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .flight-input { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px 14px; color: #e2e8f0; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; width: 160px; outline: none; }
    .btn { background: #2563eb; border: none; color: #fff; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 800; white-space: nowrap; }
    .btn:hover { opacity: 0.85; }
    .btn.green { background: #10b981; }
    .btn.gold { background: #f59e0b; color: #000; }
    .btn.red { background: #ef4444; }
    .btn.purple { background: #a855f7; }
    .actual-box { background: #0f2a1a; border: 1px solid #10b981; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    .actual-box h3 { color: #10b981; font-size: 0.8rem; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .actual-fields { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 0.62rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .actual-input { background: #1e293b; border: 2px solid #334155; border-radius: 6px; padding: 8px 12px; color: #f59e0b; font-size: 1rem; font-weight: 900; width: 100px; outline: none; }
    .actual-input.locked { border-color: #10b981; color: #10b981; }
    .stats-row { display: flex; gap: 24px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-val { font-size: 1.3rem; font-weight: 900; color: #f59e0b; }
    .stat-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; }
    .empty { color: #475569; font-size: 0.85rem; padding: 12px; text-align: center; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: #fff; padding: 10px 24px; border-radius: 8px; font-weight: 700; display: none; z-index: 999; font-size: 0.9rem; max-width: 90vw; text-align: center; }
    .toast.show { display: block; }
    .toast.error { background: #ef4444; }
    .auth-screen { max-width: 340px; margin: 80px auto; }
    .auth-screen input { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: #e2e8f0; font-size: 1rem; margin-bottom: 12px; outline: none; }
    .fa-status { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .fa-status.scheduled  { background: #1e3a5f; color: #60a5fa; }
    .fa-status.departed   { background: #1a2e1a; color: #4ade80; }
    .fa-status.arrived    { background: #1a1000; color: #f59e0b; }
    .fa-status.cancelled  { background: #3f0000; color: #f87171; }
    .flight-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .flight-code { font-size: 1.1rem; font-weight: 900; color: #f59e0b; }
    .flight-date-badge { font-size: 0.72rem; color: #a855f7; font-weight: 700; background: rgba(168,85,247,0.1); padding: 2px 8px; border-radius: 20px; }
    .del-btn { background: #ef4444; border: none; color: #fff; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 700; }
    .bp-btn { background: #334155; border: none; color: #94a3b8; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 700; }
    .rank-badge { display: inline-block; width: 24px; text-align: center; }
  </style>
</head>
<body>

<div id="auth-screen" class="auth-screen card">
  <h1>🔐 AGS Admin</h1>
  <p style="color:#64748b;font-size:0.8rem;margin-bottom:16px;">Enter admin key</p>
  <input type="password" id="key-input" placeholder="Admin key" onkeydown="if(event.key==='Enter')login()">
  <button class="btn" style="width:100%" onclick="login()">Login</button>
  <div id="auth-error" style="color:#ef4444;font-size:0.8rem;margin-top:8px;display:none;">Invalid key</div>
</div>

<div id="main" style="display:none;max-width:960px;margin:0 auto;">
  <h1>✈️ Airport Gate Sweep — Admin</h1>
  <div class="sub">Supabase persistent storage · Auto-scores on arrival</div>

  <div class="toolbar">
    <input class="flight-input" id="flight-filter" placeholder="e.g. QF533" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')loadFlight()">
    <button class="btn" onclick="loadFlight()">Load Flight</button>
    <button class="btn green" onclick="loadAll()">All Flights</button>
    <button class="btn purple" onclick="toggleHistory()">🏆 Winners History</button>
    <button class="btn" style="background:#6366f1" onclick="exportCSV()">Export CSV</button>
  </div>

  <!-- Winners History Panel -->
  <div id="history-panel" style="display:none;margin-bottom:16px;">
    <div class="card">
      <h3 style="color:#a855f7;font-size:0.9rem;font-weight:900;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;">🏆 Completed Flights & Winners</h3>
      <div id="history-content"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats-row" style="display:none;" class="card">
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="stat-entries">0</div><div class="stat-label">Total Entries</div></div>
      <div class="stat"><div class="stat-val" id="stat-flights">0</div><div class="stat-label">Flights</div></div>
      <div class="stat"><div class="stat-val" id="stat-leader">—</div><div class="stat-label">Current Leader</div></div>
    </div>
  </div>

  <div id="results"></div>
</div>

<div id="toast" class="toast"></div>

<script>
  let adminKey = '';
  let allData  = {};  // { flightKey: [entries] }
  const BASE   = '/.netlify/functions/api';

  // ── Auth ─────────────────────────────────────────────────────
  function login() {
    const k = document.getElementById('key-input').value.trim();
    fetch(`${BASE}/admin?key=${encodeURIComponent(k)}`)
      .then(r => { if (r.status === 403) throw new Error('forbidden'); return r.json(); })
      .then(data => {
        adminKey = k;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main').style.display = 'block';
        allData = data.flights || {};
        renderAll(allData);
      })
      .catch(() => { document.getElementById('auth-error').style.display = 'block'; });
  }

  // ── Load ─────────────────────────────────────────────────────
  function loadAll() {
    fetch(`${BASE}/admin?key=${encodeURIComponent(adminKey)}`)
      .then(r => r.json())
      .then(data => { allData = data.flights || {}; renderAll(allData); });
  }

  function loadFlight() {
    const raw = document.getElementById('flight-filter').value.trim().toUpperCase();
    if (!raw) { loadAll(); return; }

    // First resolve to a dated key via FlightAware
    fetch(`${BASE}/flight/${encodeURIComponent(raw)}`)
      .then(r => r.json())
      .then(fd => {
        const key = fd.flight_key || raw;
        return fetch(`${BASE}/admin?key=${encodeURIComponent(adminKey)}&flight=${encodeURIComponent(key)}`)
          .then(r => r.json())
          .then(data => {
            const entries = data.entries || [];
            const actuals = data.actuals || null;
            allData = { [key]: entries };
            renderOne(key, entries, actuals, fd.state, fd);
          });
      })
      .catch(() => showToast('Could not load flight', true));
  }

  // ── Render ────────────────────────────────────────────────────
  function renderAll(flights) {
    const keys = Object.keys(flights);
    document.getElementById('stats-row').style.display = keys.length ? 'block' : 'none';
    const totalEntries = keys.reduce((n, k) => n + (flights[k]?.length || 0), 0);
    document.getElementById('stat-entries').textContent = totalEntries;
    document.getElementById('stat-flights').textContent = keys.length;
    document.getElementById('stat-leader').textContent = '—';

    if (!keys.length) {
      document.getElementById('results').innerHTML = '<div class="empty">No flights yet</div>';
      return;
    }

    document.getElementById('results').innerHTML = keys.map(key => {
      const entries = flights[key] || [];
      return buildFlightCard(key, entries, null, null, null);
    }).join('');
  }

  function renderOne(key, entries, actuals, state, faData) {
    document.getElementById('stats-row').style.display = 'none';
    document.getElementById('results').innerHTML = buildFlightCard(key, entries, actuals, state, faData);
  }

  function buildFlightCard(key, entries, actuals, state, faData) {
    const parts = key.split('_');
    const code = parts[0];
    const date = parts[1] || '';
    const lockedDep = actuals?.actual_dep || '';
    const lockedArr = actuals?.actual_arr || '';
    const stateClass = state || 'scheduled';
    const stateLabel = state || '—';

    const scored = scoreEntries(entries, lockedDep, lockedArr);
    const hasScores = scored.some(e => e.score !== null);

    const rows = scored.map((e, i) => `
      <tr>
        <td><span class="rank-badge">${i===0&&hasScores?'🏆':i===1&&hasScores?'🥈':i===2&&hasScores?'🥉':i+1}</span></td>
        <td class="seat">${e.seat||'—'}</td>
        <td style="color:#10b981;font-size:0.75rem;font-weight:700;">${e.mobile||'—'}</td>
        <td class="time">${e.dep_time||'—'}</td>
        <td class="time">${e.arr_time||'—'}</td>
        <td style="color:#64748b;font-size:0.72rem;">${e.created_at ? new Date(e.created_at).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}) : '—'}</td>
        ${hasScores ? `<td style="font-weight:900;color:${i===0?'#f59e0b':'#94a3b8'};">${e.score !== null ? e.score+'m' : '—'}</td>` : ''}
        <td>${e.has_boarding_pass ? `<button class="bp-btn" onclick="fetchAndShowBP('${key}','${e.dep_time}','${e.arr_time}')">📋 View</button>` : '—'}</td>
        <td><button class="del-btn" onclick="deleteEntry('${key}','${encodeURIComponent(e.dep_time+'|'+e.arr_time)}')">✕</button></td>
      </tr>`).join('');

    return `
      <div class="card" id="flight-card-${key}">
        <div class="flight-header">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div class="flight-code">✈️ ${code}</div>
            ${date ? `<span class="flight-date-badge">${date}</span>` : ''}
            <span id="fa-status-${key}" class="fa-status ${stateClass}">${stateLabel}</span>
          </div>
          <div style="color:#64748b;font-size:0.75rem;">${entries.length} ${entries.length===1?'entry':'entries'}</div>
        </div>

        <div class="actual-box">
          <h3>📡 Actual Times</h3>
          <div class="actual-fields">
            <div class="field">
              <label>Actual Gate Dep</label>
              <input class="actual-input ${lockedDep?'locked':''}" id="actual-dep-${key}" placeholder="--:--" value="${lockedDep}" oninput="onActualInput('${key}')">
            </div>
            <div class="field">
              <label>Actual Gate Arr</label>
              <input class="actual-input ${lockedArr?'locked':''}" id="actual-arr-${key}" placeholder="--:--" value="${lockedArr}" oninput="onActualInput('${key}')">
            </div>
            <button class="btn green" onclick="refreshFA('${key}')">🔄 Refresh FlightAware</button>
            <button class="btn gold" onclick="manualLock('${key}')">🔒 Lock & Award</button>
            <button class="btn red" onclick="cancelFlight('${key}')">❌ Cancel Flight</button>
          </div>
          <div id="lock-status-${key}" style="margin-top:8px;font-size:0.75rem;color:${lockedDep?'#10b981':'#64748b'};">
            ${lockedDep ? `✅ Dep locked: ${lockedDep}${lockedArr ? ` · Arr locked: ${lockedArr}` : ' · Arr pending'}` : 'Not locked — hit Refresh FlightAware or enter times manually then Lock & Award'}
          </div>
        </div>

        <table>
          <thead><tr>
            <th>#</th><th>Seat</th><th>Mobile</th><th>Dep Pick</th><th>Arr Pick</th><th>Time</th>
            ${hasScores ? '<th>Score</th>' : ''}
            <th>BP</th><th>Delete</th>
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="9" class="empty">No entries</td></tr>'}</tbody>
        </table>
      </div>`;
  }

  // ── Scoring ───────────────────────────────────────────────────
  function timeToMins(t) {
    if (!t) return null;
    const clean = t.replace(/^[<>]\s*/, '');
    const [h, m] = clean.split(':').map(Number);
    if (isNaN(h) || isNaN(m)) return null;
    return h * 60 + m;
  }

  function scoreEntries(entries, actualDep, actualArr) {
    const adm = timeToMins(actualDep);
    const aam = timeToMins(actualArr);
    return (entries || []).map(e => {
      const dm = timeToMins(e.dep_time);
      const am = timeToMins(e.arr_time);
      const depDiff = (adm !== null && dm !== null) ? Math.abs(dm - adm) : null;
      const arrDiff = (aam !== null && am !== null) ? Math.abs(am - aam) : null;
      const score   = (depDiff !== null && arrDiff !== null) ? depDiff + arrDiff : null;
      return { ...e, depDiff, arrDiff, score };
    }).sort((a, b) => (a.score ?? 9999) - (b.score ?? 9999));
  }

  // ── Manual input handler ──────────────────────────────────────
  function onActualInput(key) {
    const dep = document.getElementById(`actual-dep-${key}`)?.value || '';
    const arr = document.getElementById(`actual-arr-${key}`)?.value || '';
    // Re-render scores in table without saving yet
    const entries = allData[key] || [];
    const scored = scoreEntries(entries, dep, arr);
    // Just update lock status hint
    const ls = document.getElementById(`lock-status-${key}`);
    if (ls) ls.textContent = dep ? `Ready to lock — hit 🔒 Lock & Award when correct` : 'Enter times then hit Lock & Award';
  }

  // ── Refresh from FlightAware — locks immediately ───────────────
  async function refreshFA(key) {
    const stEl = document.getElementById(`fa-status-${key}`);
    if (stEl) { stEl.textContent = 'checking...'; stEl.className = 'fa-status scheduled'; }

    let fd;
    try {
      const r = await fetch(`${BASE}/flight/${encodeURIComponent(key)}`);
      fd = await r.json();
    } catch(e) { showToast('Could not reach FlightAware', true); return; }

    if (stEl) { stEl.textContent = fd.state || 'unknown'; stEl.className = `fa-status ${fd.state||'scheduled'}`; }

    const hasDep = fd.actual_dep && fd.actual_dep !== '--:--';
    const hasArr = fd.actual_arr && fd.actual_arr !== '--:--';

    if (!hasDep) {
      showToast(`Status: ${fd.state} — no actuals from FlightAware yet`);
      return;
    }

    // Set fields
    const depEl = document.getElementById(`actual-dep-${key}`);
    const arrEl = document.getElementById(`actual-arr-${key}`);
    if (depEl) { depEl.value = fd.actual_dep; depEl.classList.add('locked'); }
    if (hasArr && arrEl) { arrEl.value = fd.actual_arr; arrEl.classList.add('locked'); }

    // Lock to Supabase immediately
    await lockActuals(key, fd.actual_dep, hasArr ? fd.actual_arr : null);
  }

  // ── Manual lock & award ───────────────────────────────────────
  async function manualLock(key) {
    const dep = document.getElementById(`actual-dep-${key}`)?.value?.trim();
    const arr = document.getElementById(`actual-arr-${key}`)?.value?.trim();
    if (!dep) { showToast('Enter departure time first', true); return; }
    await lockActuals(key, dep, arr || null);
  }

  // ── Core lock function — saves to Supabase, auto-awards winner ─
  async function lockActuals(key, dep, arr) {
    const ls = document.getElementById(`lock-status-${key}`);
    if (ls) ls.textContent = 'Saving to database...';

    try {
      const r = await fetch(`${BASE}/admin/lock`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: adminKey, flight: key, actual_dep: dep, actual_arr: arr })
      });
      const d = await r.json();

      if (!d.ok) { showToast('Lock failed: ' + (d.error||'unknown'), true); return; }

      const depEl = document.getElementById(`actual-dep-${key}`);
      const arrEl = document.getElementById(`actual-arr-${key}`);
      if (depEl && dep) { depEl.value = dep; depEl.classList.add('locked'); }
      if (arrEl && arr) { arrEl.value = arr; arrEl.classList.add('locked'); }

      if (d.winner) {
        if (ls) ls.style.color = '#f59e0b';
        if (ls) ls.textContent = `✅ Locked — 🏆 Winner auto-awarded: Seat ${d.winner}`;
        showToast(`🏆 Winner: Seat ${d.winner} — players can see results now`);
      } else if (arr) {
        if (ls) ls.style.color = '#10b981';
        if (ls) ls.textContent = `✅ Dep: ${dep} · Arr: ${arr} — locked permanently`;
        showToast(`Locked: dep ${dep} · arr ${arr}`);
      } else {
        if (ls) ls.style.color = '#10b981';
        if (ls) ls.textContent = `✅ Dep locked: ${dep} · Waiting for arrival time`;
        showToast(`Dep locked: ${dep} — refresh again after landing for arrival`);
      }
    } catch(e) { showToast('Network error saving actuals', true); }
  }

  // ── Cancel flight ─────────────────────────────────────────────
  async function cancelFlight(key) {
    const code = key.split('_')[0];
    if (!confirm(`Mark ${code} as CANCELLED?\n\nPassengers will see a cancellation notice. No winner will be awarded.`)) return;
    try {
      const r = await fetch(`${BASE}/admin/cancel`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: adminKey, flight: key })
      });
      const d = await r.json();
      if (d.ok) showToast(`${code} marked as cancelled`);
      else showToast('Error: ' + d.error, true);
    } catch(e) { showToast('Network error', true); }
  }

  // ── Winners History ───────────────────────────────────────────
  function toggleHistory() {
    const panel = document.getElementById('history-panel');
    const showing = panel.style.display !== 'none';
    panel.style.display = showing ? 'none' : 'block';
    if (!showing) loadHistory();
  }

  function loadHistory() {
    const content = document.getElementById('history-content');
    content.innerHTML = '<div class="empty">Loading...</div>';
    fetch(`${BASE}/admin?key=${encodeURIComponent(adminKey)}`)
      .then(r => r.json())
      .then(data => {
        const winners = data.winners || {};
        const flights = data.flights || {};
        const completed = Object.entries(winners).filter(([, w]) => !w.cancelled);
        const cancelled = Object.entries(winners).filter(([, w]) => w.cancelled);

        if (!completed.length && !cancelled.length) {
          content.innerHTML = '<div class="empty">No completed flights yet</div>';
          return;
        }

        const renderWinner = ([key, w]) => {
          const code = key.split('_')[0];
          const date = w.flightDate || key.split('_')[1] || '';
          const allScores = w.allScores || [];
          const winner = w.winner || {};
          const entryCount = (flights[key] || []).length;

          if (w.cancelled) {
            return `<div style="margin-bottom:12px;border:1px solid #3f0000;border-radius:10px;overflow:hidden;">
              <div style="background:#1e293b;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
                <div><span style="font-weight:900;color:#f87171;">✈️ ${code}</span> ${date?`<span class="flight-date-badge">${date}</span>`:''}</div>
                <span style="font-size:0.72rem;color:#f87171;font-weight:700;">❌ CANCELLED</span>
              </div>
            </div>`;
          }

          const rows = allScores.map((s, i) => `
            <tr style="${i===0?'background:rgba(168,85,247,0.1);':''}">
              <td style="padding:5px 10px;">${i===0?'🏆':i===1?'🥈':i===2?'🥉':i+1}</td>
              <td style="padding:5px 10px;font-weight:900;color:${i===0?'#a855f7':'#e2e8f0'};">${s.seat}</td>
              <td style="padding:5px 10px;color:#60a5fa;">${s.dep||s.dep_time||'—'}</td>
              <td style="padding:5px 10px;color:#60a5fa;">${s.arr||s.arr_time||'—'}</td>
              <td style="padding:5px 10px;font-weight:${i===0?'900':'400'};color:${i===0?'#a855f7':'#94a3b8'};">${s.score!=null?s.score+'m':'—'}</td>
            </tr>`).join('');

          return `<div style="margin-bottom:16px;border:1px solid #334155;border-radius:10px;overflow:hidden;">
            <div style="background:#1e293b;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
              <div>
                <span style="font-weight:900;font-size:1rem;color:#f59e0b;">✈️ ${code}</span>
                ${date?`<span class="flight-date-badge" style="margin-left:8px;">${date}</span>`:''}
                <span style="margin-left:8px;font-size:0.72rem;color:#64748b;">${entryCount} entries</span>
              </div>
              <div style="font-size:0.72rem;color:#64748b;">
                Actual: ${w.actualDep||'—'} → ${w.actualArr||'—'} &nbsp;·&nbsp;
                ${w.publishedAt ? new Date(w.publishedAt).toLocaleString('en-AU') : '—'}
              </div>
            </div>
            <div style="padding:12px 16px;background:#0f172a;">
              <div style="font-size:0.85rem;color:#a855f7;font-weight:900;margin-bottom:10px;">
                🏆 WINNER: Seat ${winner.seat} — ${winner.score}m off
              </div>
              <table style="width:100%;border-collapse:collapse;font-size:0.78rem;color:#e2e8f0;">
                <thead><tr style="color:#64748b;font-size:0.65rem;text-transform:uppercase;">
                  <th style="padding:4px 10px;text-align:left;">#</th>
                  <th style="padding:4px 10px;text-align:left;">Seat</th>
                  <th style="padding:4px 10px;text-align:left;">Dep</th>
                  <th style="padding:4px 10px;text-align:left;">Arr</th>
                  <th style="padding:4px 10px;text-align:left;">Score</th>
                </tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>`;
        };

        content.innerHTML = completed.map(renderWinner).join('') +
          (cancelled.length ? `<div style="margin-top:16px;font-size:0.75rem;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Cancelled Flights</div>` + cancelled.map(renderWinner).join('') : '');
      });
  }

  // ── Delete entry ──────────────────────────────────────────────
  function deleteEntry(key, encodedCombo) {
    if (!confirm('Delete this entry?')) return;
    const combo = decodeURIComponent(encodedCombo);
    fetch(`${BASE}/admin/picks/${key}/${encodeURIComponent(combo)}?key=${encodeURIComponent(adminKey)}`, { method: 'DELETE' })
      .then(r => r.json())
      .then(d => { if (d.ok) { showToast('Deleted'); loadFlight(); } else showToast('Error', true); });
  }

  // ── Boarding pass ─────────────────────────────────────────────
  async function fetchAndShowBP(key, dep, arr) {
    try {
      const r = await fetch(`${BASE}/admin/bp/${key}/${encodeURIComponent(dep)}/${encodeURIComponent(arr)}?key=${encodeURIComponent(adminKey)}`);
      const d = await r.json();
      if (d.boarding_pass) {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer;';
        modal.innerHTML = `<img src="${d.boarding_pass}" style="max-width:95vw;max-height:95vh;border-radius:8px;">`;
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
      } else showToast('No boarding pass for this entry');
    } catch(e) { showToast('Could not load boarding pass', true); }
  }

  // ── Export CSV ────────────────────────────────────────────────
  function exportCSV() {
    const rows = [['Flight','Date','Seat','Mobile','Dep Pick','Arr Pick','Timestamp']];
    for (const [key, entries] of Object.entries(allData)) {
      const parts = key.split('_');
      const code = parts[0];
      const date = parts[1] || '';
      for (const e of (entries || [])) {
        rows.push([code, date, e.seat||'', e.mobile||'', e.dep_time||'', e.arr_time||'', e.created_at||'']);
      }
    }
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = `AGS_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast('CSV downloaded');
  }

  // ── Toast ─────────────────────────────────────────────────────
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.classList.remove('show'), 4000);
  }
</script>
</body>
</html>
