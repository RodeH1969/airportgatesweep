<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AGS Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
    h1 { font-size: 1.4rem; font-weight: 900; color: #f59e0b; margin-bottom: 4px; }
    .sub { font-size: 0.8rem; color: #64748b; margin-bottom: 20px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .flight-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .flight-code { font-size: 1.1rem; font-weight: 900; color: #f59e0b; }
    .flight-count { font-size: 0.75rem; color: #64748b; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { text-align: left; padding: 6px 10px; color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #334155; }
    td { padding: 8px 10px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
    tr:hover td { background: #273548; }
    .seat { font-weight: 900; color: #e2e8f0; }
    .time { color: #60a5fa; font-weight: 700; }
    .score { font-weight: 900; }
    .score.winner { color: #f59e0b; font-size: 1rem; }
    .del-btn { background: #ef4444; border: none; color: #fff; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 700; }
    .del-btn:hover { background: #dc2626; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .flight-input { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px 14px; color: #e2e8f0; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; width: 140px; outline: none; }
    .btn { background: #2563eb; border: none; color: #fff; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 800; white-space: nowrap; }
    .btn:hover { background: #1d4ed8; }
    .btn.green { background: #10b981; }
    .btn.green:hover { background: #059669; }
    .btn.gold { background: #f59e0b; color: #000; }
    .btn.gold:hover { background: #d97706; }
    .btn.red { background: #ef4444; }
    .btn.red:hover { background: #dc2626; }
    .actual-box { background: #0f2a1a; border: 1px solid #10b981; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    .actual-box h3 { color: #10b981; font-size: 0.85rem; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .actual-fields { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .actual-input { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; color: #e2e8f0; font-size: 0.95rem; font-weight: 800; width: 100px; outline: none; }
    .winner-box { background: linear-gradient(135deg, #1a1000, #2d1f00); border: 2px solid #f59e0b; border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: center; display: none; }
    .winner-box.show { display: block; }
    .winner-trophy { font-size: 3rem; margin-bottom: 8px; }
    .winner-name { font-size: 2rem; font-weight: 900; color: #f59e0b; }
    .winner-score { font-size: 0.9rem; color: #94a3b8; margin-top: 4px; }
    .winner-times { font-size: 0.8rem; color: #64748b; margin-top: 8px; }
    .publish-row { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
    .stats-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat { text-align: center; }
    .stat-val { font-size: 1.3rem; font-weight: 900; color: #f59e0b; }
    .stat-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; }
    .empty { color: #475569; font-size: 0.85rem; padding: 12px; text-align: center; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: #fff; padding: 10px 24px; border-radius: 8px; font-weight: 700; display: none; z-index: 999; font-size: 0.9rem; }
    .toast.show { display: block; }
    .auth-screen { max-width: 340px; margin: 80px auto; }
    .auth-screen input { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: #e2e8f0; font-size: 1rem; margin-bottom: 12px; outline: none; }
    .rank-badge { display: inline-block; width: 24px; text-align: center; }
    .fa-status { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .fa-status.scheduled { background: #1e3a5f; color: #60a5fa; }
    .fa-status.departed  { background: #1a2e1a; color: #4ade80; }
    .fa-status.arrived   { background: #1a1000; color: #f59e0b; }
    .loading { color: #64748b; font-style: italic; font-size: 0.8rem; }
  </style>
</head>
<body>

<div id="auth-screen" class="auth-screen card">
  <h1>🔐 AGS Admin</h1>
  <p style="color:#64748b;font-size:0.8rem;margin-bottom:16px;">Enter admin key to continue</p>
  <input type="password" id="key-input" placeholder="Admin key" onkeydown="if(event.key==='Enter')login()">
  <button class="btn" style="width:100%" onclick="login()">Login</button>
  <div id="auth-error" style="color:#ef4444;font-size:0.8rem;margin-top:8px;display:none;">Invalid key</div>
</div>

<div id="main" style="display:none;max-width:960px;margin:0 auto;">
  <h1>✈️ Airport Gate Sweep — Admin</h1>
  <div class="sub">Persistent storage via GitHub · Auto-scores on arrival</div>

  <div class="toolbar">
    <input class="flight-input" id="flight-filter" placeholder="e.g. QF533" oninput="this.value=this.value.toUpperCase()">
    <button class="btn" onclick="loadFlight()">Load Flight</button>
    <button class="btn green" onclick="loadAll()">All Flights</button>
    <button class="btn" style="background:#a855f7" onclick="showHistory()">🏆 Winners History</button>
    <button class="btn" style="background:#6366f1" onclick="exportCSV()">Export CSV</button>
  </div>

  <div id="history-panel" style="display:none;margin-bottom:16px;">
    <div class="card">
      <h3 style="color:#a855f7;font-size:0.9rem;font-weight:900;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;">🏆 Completed Flights & Winners</h3>
      <div id="history-content"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <div id="stats-row" style="display:none;" class="card">
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="stat-entries">0</div><div class="stat-label">Total Entries</div></div>
      <div class="stat"><div class="stat-val" id="stat-flights">0</div><div class="stat-label">Flights</div></div>
      <div class="stat"><div class="stat-val" id="stat-leader">—</div><div class="stat-label">Current Leader</div></div>
    </div>
  </div>

  <div id="results"></div>
</div>

<div id="toast" class="toast"></div>

<script>
  let adminKey  = '';
  let allData   = {};
  let faCache   = {}; // cache FA data per flight
  let actualCache = {}; // locked actual times from server
  const BASE    = '/.netlify/functions/api';

  function login() {
    const k = document.getElementById('key-input').value.trim();
    adminKey = k;
    fetch(`${BASE}/admin?key=${encodeURIComponent(k)}`)
      .then(r => { if (r.status === 403) { document.getElementById('auth-error').style.display='block'; return null; } return r.json(); })
      .then(data => {
        if (!data) return;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main').style.display = 'block';
        // Supabase returns flights as { code: [array of entries] }
        allData = data.flights || {};
        renderAll(allData);
      });
  }

  function loadAll() {
    fetch(`${BASE}/admin?key=${encodeURIComponent(adminKey)}`)
      .then(r => r.json())
      .then(data => { allData = data.flights || {}; renderAll(allData); });
  }

  function loadFlight() {
    const code = document.getElementById('flight-filter').value.trim().toUpperCase();
    if (!code) { loadAll(); return; }

    fetch(`${BASE}/admin?key=${encodeURIComponent(adminKey)}&flight=${code}`)
      .then(r => r.json())
      .then(data => {
        // Supabase: entries is array, actuals is object
        const entries = data.entries || [];
        const actuals = data.actuals || null;
        allData = { [code]: entries };

        if (actuals?.actual_dep || actuals?.actual_arr) {
          if (!faCache[code]) faCache[code] = {};
          if (actuals.actual_dep) { faCache[code].actual_dep = actuals.actual_dep; faCache[code].state = 'departed'; }
          if (actuals.actual_arr) { faCache[code].actual_arr = actuals.actual_arr; faCache[code].state = 'arrived'; }
        }
        const cachedDep = faCache[code]?.actual_dep || null;
        const cachedArr = faCache[code]?.actual_arr || null;
        renderAll(allData, cachedDep, cachedArr, code);

        // If no entries, still show the flight card with FA status
        if (!Object.keys(entries).length) {
          allData = { [code]: {} };
          renderAll(allData, cachedDep, cachedArr, code);
          document.getElementById('results').innerHTML =
            `<div class="card" id="flight-card-${code}">
              <div class="flight-header">
                <div style="display:flex;align-items:center;gap:10px;">
                  <div class="flight-code">✈️ ${code}</div>
                  <span id="fa-status-${code}" class="fa-status scheduled">—</span>
                </div>
                <div class="flight-count">0 entries</div>
              </div>
              <div class="actual-box">
                <h3>📡 Actual Times — Auto-pulled from FlightAware</h3>
                <div class="actual-fields">
                  <div class="field"><label>Actual Gate Dep</label>
                    <input class="actual-input" id="actual-dep-${code}" placeholder="--:--" value="${cachedDep||''}" oninput="recalc('${code}')">
                  </div>
                  <div class="field"><label>Actual Gate Arr</label>
                    <input class="actual-input" id="actual-arr-${code}" placeholder="--:--" value="${cachedArr||''}" oninput="recalc('${code}')">
                  </div>
                  <button class="btn green" onclick="refreshFA('${code}')">🔄 Refresh from FlightAware</button>
                </div>
              </div>
              <div class="empty">No entries yet for ${code}</div>
            </div>`;
        }
      });
  }

  function timeToMins(t) {
    if (!t) return null;
    const clean = t.replace(/^[<>]\s*/, '');
    const parts = clean.split(':').map(Number);
    if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
    return parts[0] * 60 + parts[1];
  }

  function recalc(code) {
    const depEl = document.getElementById(`actual-dep-${code}`);
    const arrEl = document.getElementById(`actual-arr-${code}`);
    // Read from field first, fall back to FA cache
    const actualDep = (depEl && depEl.value) || (faCache[code]?.actual_dep) || '';
    const actualArr = (arrEl && arrEl.value) || (faCache[code]?.actual_arr) || '';
    renderFlight(code, allData[code] || {}, actualDep, actualArr);
  }

  function renderAll(flights, actualDep, actualArr, focusCode) {
    const results = document.getElementById('results');
    results.innerHTML = '';
    let totalEntries = 0, flightCount = 0, globalBest = null;

    for (const [code, entries] of Object.entries(flights)) {
      const list = Array.isArray(entries) ? entries : Object.entries(entries || {});
      if (!list.length) continue;
      flightCount++;
      totalEntries += list.length;
      const scored = scoreEntries(list, actualDep, actualArr);
      if (scored.length && scored[0].total !== null) {
        if (!globalBest || scored[0].total < (globalBest.total ?? 9999)) {
          globalBest = { ...scored[0], flight: code };
        }
      }
      const cachedDep = faCache[code]?.actual_dep || null;
      const cachedArr = faCache[code]?.actual_arr || null;
      renderFlight(code, entries,
        (focusCode === code ? actualDep : null) || cachedDep,
        (focusCode === code ? actualArr : null) || cachedArr
      );
    }

    if (totalEntries > 0) {
      document.getElementById('stats-row').style.display = 'block';
      document.getElementById('stat-entries').textContent = totalEntries;
      document.getElementById('stat-flights').textContent = flightCount;
      document.getElementById('stat-leader').textContent  = globalBest ? `${globalBest.seat}` : '—';
    }
    if (totalEntries === 0) results.innerHTML = '<div class="empty">No entries found</div>';
  }

  function scoreEntries(list, actualDep, actualArr) {
    const adm = timeToMins(actualDep);
    const aam = timeToMins(actualArr);
    // Handle both array (Supabase) and object (legacy) formats
    const entries = Array.isArray(list) ? list : Object.entries(list).map(([combo, entry]) => {
      const e = typeof entry === 'object' ? entry : { seat: entry };
      return { dep_time: combo.split('|')[0], arr_time: combo.split('|')[1], ...e };
    });
    return entries.map(e => {
      const dm = timeToMins(e.dep_time);
      const am = timeToMins(e.arr_time);
      const depDiff = (adm !== null && dm !== null) ? Math.abs(dm - adm) : null;
      const arrDiff = (aam !== null && am !== null) ? Math.abs(am - aam) : null;
      const total   = (depDiff !== null && arrDiff !== null) ? depDiff + arrDiff : null;
      return { combo: e.dep_time + '|' + e.arr_time, ...e, depDiff, arrDiff, total };
    }).sort((a, b) => (a.total ?? 9999) - (b.total ?? 9999));
  }

  function renderFlight(code, entries, actualDep, actualArr) {
    const existing = document.getElementById(`flight-card-${code}`);
    const list = Object.entries(entries || {});
    const scored = scoreEntries(list, actualDep, actualArr);
    const hasScores = scored.some(s => s.total !== null);
    const winner = hasScores ? scored[0] : null;

    const card = document.createElement('div');
    card.className = 'card';
    card.id = `flight-card-${code}`;

    card.innerHTML = `
      <div class="flight-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="flight-code">✈️ ${code}</div>
          <span id="fa-status-${code}" class="fa-status scheduled">—</span>
        </div>
        <div class="flight-count">${list.length} entr${list.length===1?'y':'ies'}</div>
      </div>

      <!-- Winner box -->
      <div id="winner-box-${code}" class="winner-box ${winner ? 'show' : ''}">
        <div class="winner-trophy">🏆</div>
        <div class="winner-name">Seat ${winner?.seat || '—'}</div>
        <div class="winner-score">${winner?.total !== null && winner?.total !== undefined ? `Score: ${winner.depDiff}m + ${winner.arrDiff}m = ${winner.total} mins off` : ''}</div>
        <div class="winner-times">Actual dep: ${actualDep || '—'} · Actual arr: ${actualArr || '—'}</div>
        <div class="publish-row">
          <button class="btn gold" onclick="publishWinner('${code}')">📢 Publish Winner to Players</button>
        </div>
      </div>

      <!-- Actual times -->
      <div class="actual-box">
        <h3>📡 Actual Times — Auto-pulled from FlightAware</h3>
        <div class="actual-fields">
          <div class="field">
            <label>Actual Gate Dep</label>
            <input class="actual-input" id="actual-dep-${code}" placeholder="--:--" value="${actualDep || (faCache[code]?.actual_dep || '')}" oninput="recalc('${code}')">
          </div>
          <div class="field">
            <label>Actual Gate Arr</label>
            <input class="actual-input" id="actual-arr-${code}" placeholder="--:--" value="${actualArr || (faCache[code]?.actual_arr || '')}" oninput="recalc('${code}')">
          </div>
          <button class="btn green" onclick="refreshFA('${code}')">🔄 Refresh from FlightAware</button>
          <button class="btn gold" onclick="recalc('${code}')">🏆 Calculate Winner</button>
        </div>
      </div>

      <!-- Leaderboard -->
      <table>
        <thead><tr>
          <th>#</th><th>Seat</th><th>Mobile</th><th>Dep Pick</th><th>Arr Pick</th><th>Time</th>
          ${hasScores ? '<th>Score</th>' : ''}
          <th>BP</th><th>Delete</th>
        </tr></thead>
        <tbody id="tbody-${code}">
        ${scored.map((e, i) => `
          <tr>
            <td><span class="rank-badge">${i===0&&hasScores?'🏆':i===1&&hasScores?'🥈':i===2&&hasScores?'🥉':i+1}</span></td>
            <td class="seat">${e.seat||'—'}</td>
            <td style="color:#10b981;font-size:0.75rem;font-weight:700;">${e.mobile||'—'}</td>
            <td class="time">${e.dep_time||e.dep||'—'}</td>
            <td class="time">${e.arr_time||e.arr||'—'}</td>
            <td style="color:#475569;font-size:0.72rem;">${(e.created_at||e.timestamp) ? new Date(e.created_at||e.timestamp).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}) : '—'}</td>
            ${hasScores ? `<td class="score ${i===0?'winner':''}">${e.total!==null?`${e.depDiff}m + ${e.arrDiff}m = <strong>${e.total}m</strong>`:'—'}</td>` : ''}
            <td>${(e.boarding_pass||e.boardingPass) ? `<img src="${e.boarding_pass||e.boardingPass}" onclick="showBP(this.src)" style="width:40px;height:28px;object-fit:cover;border-radius:4px;cursor:pointer;border:1px solid #334155;" title="Click to view">` : '—'}</td>
            <td><button class="del-btn" onclick="deleteEntry('${code}','${encodeURIComponent(e.combo)}')">✕</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`;

    if (existing) existing.replaceWith(card);
    else document.getElementById('results').appendChild(card);

    // Restore status badge from cache only — NO automatic FA calls
    const stEl = document.getElementById(`fa-status-${code}`);
    if (stEl) {
      stEl.textContent = faCache[code]?.state || '—';
      stEl.className = `fa-status ${faCache[code]?.state || 'scheduled'}`;
    }
  }

  function refreshFA(code) {
    const stEl = document.getElementById(`fa-status-${code}`);
    if (stEl) { stEl.textContent = 'loading...'; stEl.className = 'fa-status scheduled'; }
    fetch(`${BASE}/flight/${code}`)
      .then(r => r.json())
      .then(fd => {
        if (stEl) { stEl.textContent = fd.state || 'unknown'; stEl.className = `fa-status ${fd.state||'scheduled'}`; }
        const depEl = document.getElementById(`actual-dep-${code}`);
        const arrEl = document.getElementById(`actual-arr-${code}`);
        if (fd.state === 'departed' || fd.state === 'arrived') {
          if (depEl && fd.actual_dep) depEl.value = fd.actual_dep;
          if (arrEl && fd.actual_arr) arrEl.value = fd.actual_arr;
          recalc(code);
        } else {
          if (depEl) depEl.value = '';
          if (arrEl) arrEl.value = '';
        }
        showToast(`FlightAware updated — status: ${fd.state}`);
      }).catch(() => showToast('Could not reach FlightAware'));
  }

  async function publishWinner(code) {
    const depEl = document.getElementById(`actual-dep-${code}`);
    const arrEl = document.getElementById(`actual-arr-${code}`);
    const actualDep = depEl?.value || '';
    const actualArr = arrEl?.value || '';
    const entries = Object.entries(allData[code] || {});
    const scored  = scoreEntries(entries, actualDep, actualArr);
    if (!scored.length || scored[0].total === null) { showToast('Calculate scores first'); return; }
    const winner = scored[0];

    const r = await fetch(`${BASE}/admin/winner`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        key: adminKey,
        flight: code,
        winner: { seat: winner.seat, dep: winner.dep, arr: winner.arr, score: winner.total, depDiff: winner.depDiff, arrDiff: winner.arrDiff },
        actualDep, actualArr,
        allScores: scored.map(s => ({ seat: s.seat, dep: s.dep, arr: s.arr, score: s.total, depDiff: s.depDiff, arrDiff: s.arrDiff }))
      })
    });
    const d = await r.json();
    if (d.ok) showToast(`🏆 Winner published! Players will see results.`);
    else showToast('Error: ' + d.error);
  }

  function deleteEntry(code, encodedCombo) {
    if (!confirm('Delete this entry?')) return;
    const combo = decodeURIComponent(encodedCombo);
    fetch(`${BASE}/admin/picks/${code}/${encodeURIComponent(combo)}?key=${encodeURIComponent(adminKey)}`, { method: 'DELETE' })
      .then(r => r.json())
      .then(d => { if (d.ok) { showToast('Deleted'); loadFlight(); } else showToast('Error: ' + d.error); });
  }

  function exportCSV() {
    const rows = [['Flight','Seat','Dep Pick','Arr Pick','Timestamp']];
    for (const [code, entries] of Object.entries(allData)) {
      for (const [combo, entry] of Object.entries(entries)) {
        const e = typeof entry === 'object' ? entry : { seat: entry, dep: combo.split('|')[0], arr: combo.split('|')[1], timestamp: '' };
        rows.push([code, e.seat, e.dep, e.arr, e.timestamp||'']);
      }
    }
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = `AGS_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    showToast('CSV downloaded');
  }

  function showHistory() {
    const panel = document.getElementById('history-panel');
    const content = document.getElementById('history-content');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if (panel.style.display === 'none') return;

    fetch(`${BASE}/admin?key=${encodeURIComponent(adminKey)}`)
      .then(r => r.json())
      .then(data => {
        const winners = data.winners || {};
        const flights = data.flights || {};

        if (!Object.keys(winners).length) {
          content.innerHTML = '<div class="empty">No completed flights yet</div>';
          return;
        }

        content.innerHTML = Object.entries(winners).map(([code, w]) => {
          const allScores = w.allScores || [];
          const winner = w.winner || {};
          const entries = flights[code] || {};
          const entryCount = Object.keys(entries).length;

          const rows = allScores.map((s, i) => `
            <tr style="${i===0?'background:rgba(168,85,247,0.1);':''}">
              <td style="padding:5px 10px;">${i===0?'🏆':i===1?'🥈':i===2?'🥉':i+1}</td>
              <td style="padding:5px 10px;font-weight:900;color:${i===0?'#a855f7':'#e2e8f0'};">${s.seat}</td>
              <td style="padding:5px 10px;color:#60a5fa;">${s.dep}</td>
              <td style="padding:5px 10px;color:#60a5fa;">${s.arr}</td>
              <td style="padding:5px 10px;font-weight:${i===0?'900':'400'};color:${i===0?'#a855f7':'#94a3b8'};">${s.score !== null ? s.score+'m' : '—'}</td>
            </tr>`).join('');

          return `
            <div style="margin-bottom:20px;border:1px solid #334155;border-radius:10px;overflow:hidden;">
              <div style="background:#1e293b;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                <div>
                  <span style="font-family:Nunito,sans-serif;font-weight:900;font-size:1rem;color:#f59e0b;">✈️ ${code}</span>
                  <span style="margin-left:10px;font-size:0.75rem;color:#64748b;">${entryCount} entries</span>
                </div>
                <div style="font-size:0.75rem;color:#64748b;">
                  Actual: ${w.actualDep||'—'} → ${w.actualArr||'—'} &nbsp;·&nbsp;
                  Published: ${w.publishedAt ? new Date(w.publishedAt).toLocaleString('en-AU') : '—'}
                </div>
              </div>
              <div style="padding:12px 16px;background:#0f172a;">
                <div style="font-size:0.8rem;color:#a855f7;font-weight:900;margin-bottom:8px;">
                  🏆 WINNER: Seat ${winner.seat} — ${winner.score}m off
                </div>
                <table style="width:100%;border-collapse:collapse;font-size:0.78rem;color:#e2e8f0;">
                  <thead><tr style="color:#64748b;font-size:0.65rem;text-transform:uppercase;">
                    <th style="padding:4px 10px;text-align:left;">#</th>
                    <th style="padding:4px 10px;text-align:left;">Seat</th>
                    <th style="padding:4px 10px;text-align:left;">Dep</th>
                    <th style="padding:4px 10px;text-align:left;">Arr</th>
                    <th style="padding:4px 10px;text-align:left;">Score</th>
                  </tr></thead>
                  <tbody>${rows}</tbody>
                </table>
              </div>
            </div>`;
        }).join('');
      });
  }

  function showBP(src) {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer;';
    modal.innerHTML = `<img src="${src}" style="max-width:95vw;max-height:95vh;border-radius:8px;">`;
    modal.onclick = () => modal.remove();
    document.body.appendChild(modal);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
